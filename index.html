<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အိမ်အသုံးစာရင်း (Edit/Delete)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-blue: #3b5998; --green: #2e7d32; --red: #c62828; --gold: #a67c00; --sky: #2980b9; }
        body { font-family: sans-serif; background: #e9ecef; margin: 0; padding-bottom: 50px; }
        .app-container { width: 100%; max-width: 450px; background: white; min-height: 100vh; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { background: var(--main-blue); color: white; text-align: center; padding: 15px; font-weight: bold; font-size: 24px; }
        .content { padding: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 18px; }
        .btn-save { background: #27ae60; }
        .btn-report { background: var(--sky); }
        
        .income-header { background: var(--green); color: white; padding: 10px; border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-between; }
        .expense-header { background: var(--red); color: white; padding: 10px; border-radius: 4px; margin-top: 10px; display: flex; justify-content: space-between; }
        .detail-item { border-bottom: 1px solid #eee; padding: 10px 5px; display: flex; flex-direction: column; position: relative; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .action-btns { margin-top: 5px; display: flex; gap: 10px; }
        .edit-btn { color: var(--sky); font-size: 14px; cursor: pointer; text-decoration: underline; }
        .delete-btn { color: var(--red); font-size: 14px; cursor: pointer; text-decoration: underline; }
        .balance-box { background: var(--sky); color: white; padding: 15px; text-align: center; border-radius: 4px; margin-top: 15px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">အိမ်အသုံးစရိတ်</div>
    <div class="content">
        <div id="formTitle" style="font-weight:bold; color:var(--main-blue); text-align:center;">စာရင်းသစ်သွင်းရန်</div>
        <input type="hidden" id="editKey">
        <input type="date" id="dateInput">
        <input type="text" id="nameInput" placeholder="အမည်">
        <input type="text" id="detailInput" placeholder="အကြောင်းအရာ">
        <input type="number" id="amountInput" placeholder="ငွေပမာဏ">
        <select id="typeInput">
            <option value="ထွက်ငွေ">ထွက်ငွေ</option>
            <option value="ဝင်ငွေ">ဝင်ငွေ</option>
        </select>
        <button id="mainBtn" class="btn-save" onclick="saveData()">စာရင်းသွင်းမည်</button>
        <button id="cancelBtn" style="display:none; background:#666;" onclick="resetForm()">မပြင်တော့ပါ</button>

        <div style="margin-top: 20px;">
            <input type="month" id="monthPicker" onchange="updateUI()">
        </div>

        <div class="income-header"><span>ဝင်ငွေစုစုပေါင်း</span> <span id="totalIn">0</span></div>
        <div id="inList" style="background:#f9f9f9; padding:5px;"></div>

        <div class="expense-header"><span>ထွက်ငွေစုစုပေါင်း</span> <span id="totalOut">0</span></div>
        <div id="outList" style="background:#f9f9f9; padding:5px;"></div>

        <div class="balance-box">လက်ကျန်: <span id="balance">0</span> ကျပ်</div>
    </div>
</div>

<script>
    // Firebase Config (mylist-c9345)
    const firebaseConfig = {
        apiKey: "AIzaSyB5jGezMP1M-FlHPb2wyOaI1_20xaTWhD8",
        authDomain: "mylist-c9345.firebaseapp.com",
        databaseURL: "https://mylist-c9345-default-rtdb.firebaseio.com",
        projectId: "mylist-c9345",
        storageBucket: "mylist-c9345.firebasestorage.app",
        messagingSenderId: "471188981345",
        appId: "1:471188981345:web:9348aa5d63434bcacf0c20"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('records');
    let allData = [];

    document.getElementById('dateInput').valueAsDate = new Date();
    document.getElementById('monthPicker').value = new Date().toISOString().substring(0, 7);

    dbRef.on('value', (snap) => {
        allData = [];
        snap.forEach((child) => { allData.push({ key: child.key, ...child.val() }); });
        updateUI();
    });

    function saveData() {
        const key = document.getElementById('editKey').value;
        const data = {
            date: document.getElementById('dateInput').value,
            name: document.getElementById('nameInput').value.trim(),
            detail: document.getElementById('detailInput').value.trim(),
            amount: parseFloat(document.getElementById('amountInput').value),
            type: document.getElementById('typeInput').value
        };

        if(!data.name || isNaN(data.amount)) return alert("အချက်အလက်ပြည့်စုံစွာဖြည့်ပါ။");

        if(key) {
            dbRef.child(key).set(data).then(() => { alert("ပြင်ဆင်ပြီးပါပြီ"); resetForm(); });
        } else {
            dbRef.push(data).then(() => { alert("သိမ်းဆည်းပြီးပါပြီ"); resetForm(); });
        }
    }

    function editItem(key) {
        const item = allData.find(i => i.key === key);
        document.getElementById('editKey').value = key;
        document.getElementById('dateInput').value = item.date;
        document.getElementById('nameInput').value = item.name;
        document.getElementById('detailInput').value = item.detail;
        document.getElementById('amountInput').value = item.amount;
        document.getElementById('typeInput').value = item.type;
        
        document.getElementById('formTitle').innerText = "စာရင်းပြန်ပြင်နေသည်...";
        document.getElementById('mainBtn').innerText = "ပြင်ဆင်ချက်သိမ်းမည်";
        document.getElementById('mainBtn').style.background = "#f39c12";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    function deleteItem(key) {
        if(confirm("ဤစာရင်းကို ဖျက်ရန် သေချာပါသလား?")) {
            dbRef.child(key).remove();
        }
    }

    function resetForm() {
        document.getElementById('editKey').value = "";
        document.getElementById('nameInput').value = "";
        document.getElementById('detailInput').value = "";
        document.getElementById('amountInput').value = "";
        document.getElementById('formTitle').innerText = "စာရင်းသစ်သွင်းရန်";
        document.getElementById('mainBtn').innerText = "စာရင်းသွင်းမည်";
        document.getElementById('mainBtn').style.background = "#27ae60";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function updateUI() {
        const month = document.getElementById('monthPicker').value;
        const filtered = allData.filter(i => i.date.startsWith(month));
        
        let tin = 0, tout = 0;
        let inHtml = '', outHtml = '';

        filtered.forEach(item => {
            const row = `
                <div class="detail-item">
                    <div class="item-row">
                        <span><b>${item.name}</b> (${item.detail})</span>
                        <span><b>${item.amount.toLocaleString()}</b></span>
                    </div>
                    <div class="action-btns">
                        <span class="edit-btn" onclick="editItem('${item.key}')">Edit</span>
                        <span class="delete-btn" onclick="deleteItem('${item.key}')">Delete</span>
                    </div>
                </div>`;
            
            if(item.type === 'ဝင်ငွေ') { tin += item.amount; inHtml += row; }
            else { tout += item.amount; outHtml += row; }
        });

        document.getElementById('totalIn').innerText = tin.toLocaleString();
        document.getElementById('totalOut').innerText = tout.toLocaleString();
        document.getElementById('balance').innerText = (tin - tout).toLocaleString();
        document.getElementById('inList').innerHTML = inHtml || "စာရင်းမရှိပါ။";
        document.getElementById('outList').innerHTML = outHtml || "စာရင်းမရှိပါ။";
    }
</script>
</body>
</html>
